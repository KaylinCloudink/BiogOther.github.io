<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OC设定集 - Kaylin设定收集区</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* ==================== CSS变量定义（主题配色方案） ==================== */
        :root {
            --bg-color: #f5f5f5;           /* 页面背景色 */
            --card-bg: #ffffff;            /* 卡片背景色 */
            --text-color: #333333;         /* 主要文字颜色 */
            --text-secondary: #666666;     /* 次要文字颜色 */
            --border-color: #e0e0e0;       /* 边框颜色 */
            --link-color: #0066cc;         /* 链接/主题色 */
            --link-hover: #0052a3;         /* 链接悬停色 */
            --shadow: rgba(0, 0, 0, 0.1);  /* 阴影颜色 */
            --sidebar-bg: #fafafa;         /* 侧边栏背景 */
            --hover-bg: #f0f0f0;           /* 悬停背景色 */
        }

        /* 深色模式变量 */
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
            --link-color: #66b3ff;
            --link-hover: #99ccff;
            --shadow: rgba(0, 0, 0, 0.3);
            --sidebar-bg: #252525;
            --hover-bg: #3a3a3a;
        }

        /* ==================== 基础重置样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
        }

        /* ==================== 导航栏样式 ==================== */
        nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--link-color);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        /* ==================== OC展示区布局（左右分栏） ==================== */
        .oc-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        /* ==================== 左侧角色列表（侧边栏） ==================== */
        .oc-sidebar {
            flex: 1;
            min-width: 240px;
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 20px 0;
            height: fit-content;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .sidebar-title {
            padding: 0 20px 15px 20px;
            font-size: 1.3rem;
            font-weight: 600;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 10px;
            color: var(--text-color);
        }

        /* 角色列表项卡片 */
        .oc-card-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            margin: 4px 12px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--sidebar-bg);
            border: 1px solid transparent;
        }

        .oc-card-item:hover {
            background-color: var(--hover-bg);
            transform: translateX(3px);
        }

        .oc-card-item.active {
            background-color: var(--link-color);
            color: white;
            border-color: var(--link-color);
        }

        .oc-card-item.active .oc-card-name {
            color: white;
        }

        /* 小头像样式 */
        .oc-card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
            overflow: hidden;
            border: 2px solid var(--border-color);
        }

        .oc-card-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 头像加载失败时的占位文字样式 */
        .avatar-placeholder {
            font-size: 1.8rem;
            line-height: 1;
        }

        .oc-card-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
        }

        /* ==================== 右侧详情面板 ==================== */
        .oc-detail {
            flex: 3;
            min-width: 280px;
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 4px 12px var(--shadow);
        }

        /* 详情头部区域（大头像+名称） */
        .detail-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        /* 详情页大头像 */
        .detail-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
            border: 3px solid var(--border-color);
            box-shadow: 0 2px 8px var(--shadow);
        }

        .detail-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .detail-name h2 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .detail-name .detail-title {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* ==================== 信息区块样式 ==================== */
        .info-section {
            margin-bottom: 28px;
        }

        .info-section h3 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 4px solid var(--link-color);
        }

        .info-content {
            background-color: var(--sidebar-bg);
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        /* 基本信息网格布局 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }

        .info-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-color);
            min-width: 70px;
        }

        .info-value {
            color: var(--text-secondary);
        }

        /* ==================== 设定图网格展示 ==================== */
        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 8px;
        }

        .image-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .image-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 12px var(--shadow);
            border-color: var(--link-color);
        }

        .image-card img {
            width: 100%;
            height: auto;
            display: block;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .image-caption {
            padding: 8px 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            border-top: 1px solid var(--border-color);
            background-color: var(--sidebar-bg);
        }

        /* ==================== 图片查看器（Lightbox）样式 ==================== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .lightbox-caption {
            color: white;
            margin-top: 20px;
            font-size: 1.1rem;
            text-align: center;
            padding: 0 20px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lightbox-close:hover {
            color: #ff6b6b;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 50px;
            cursor: pointer;
            padding: 20px;
            transition: color 0.3s;
            user-select: none;
        }

        .lightbox-nav:hover {
            color: var(--link-color);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        /* ==================== 空状态提示 ==================== */
        .empty-placeholder {
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
            font-style: italic;
        }

        /* ==================== 页脚样式 ==================== */
        footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ==================== 自定义滚动条 ==================== */
        .oc-sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .oc-sidebar::-webkit-scrollbar-track {
            background: var(--border-color);
            border-radius: 8px;
        }
        .oc-sidebar::-webkit-scrollbar-thumb {
            background: var(--link-color);
            border-radius: 8px;
        }

        /* ==================== 响应式布局（移动端适配） ==================== */
        @media (max-width: 768px) {
            .oc-container {
                flex-direction: column;
            }
            .oc-sidebar {
                max-height: none;
                order: 2; /* 移动端侧边栏放下面 */
            }
            .oc-detail {
                order: 1; /* 详情放上面 */
            }
            .detail-header {
                flex-direction: column;
                text-align: center;
            }
            .nav-links {
                gap: 1rem;
            }
            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .lightbox-nav {
                font-size: 30px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- ==================== 导航栏 ==================== -->
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">OC设定集</a>
            <div class="nav-links">
                <a href="https://kaylincloudink.github.io/BiogOther.github.io/index.html">返回上一页</a>
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- ==================== 主内容区 ==================== -->
    <main>
        <div class="oc-container">
            <!-- 左侧角色列表侧边栏 -->
            <aside class="oc-sidebar">
                <div class="sidebar-title">📖 角色名录</div>
                <div id="oc-list-container"></div>
            </aside>
            
            <!-- 右侧角色详情面板 -->
            <section class="oc-detail" id="oc-detail">
                <div class="empty-placeholder">✨ 请从左侧选择一个角色 ✨</div>
            </section>
        </div>
    </main>

    <!-- ==================== 图片查看器（Lightbox） ==================== -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
        <span class="lightbox-close" onclick="closeLightbox(event)">&times;</span>
        <span class="lightbox-nav lightbox-prev" onclick="changeImage(-1, event)">&#10094;</span>
        <span class="lightbox-nav lightbox-next" onclick="changeImage(1, event)">&#10095;</span>
        <img id="lightbox-img" class="lightbox-img" src="" alt="查看大图">
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <!-- ==================== 页脚 ==================== -->
    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利. OC设定展示页，未经允许不可随意使用本页面内的所有内容及图片！</p>
        <p> 网站内的图片已经Hex加上识别码！！请不要随意保存！！</p>
    </footer>

    <!-- ==================== JavaScript逻辑 ==================== -->
    <script>
        // ============================================================
        // OC数据定义区域 —— 请在此处修改/添加您的原创角色信息
        // 说明：
        // - avatar: 角色头像，支持本地路径（如 "1.jpg"）或网络URL
        // - images: 设定图数组，每个元素可以是字符串URL或对象{url, caption}
        // - 所有文本字段支持HTML转义，防止XSS攻击
        // ============================================================
        const ocData = [
            {
                id: 1,
                name: "Kaylin Cloudink（云墨）",
                title: "主设定/自设",
                avatar: "images/文件已有标识码1.jpg",
                basicInfo: {
                    "性别": "Male",
                    "种族": "北大湖松霖玊狼",
                    "生日": "04/22"
                },
                personality: "社恐，平时话比较少，有时候对于朋友的话题不知道怎么回答",
                background: "北大湖松霖玊狼一族，但似乎“同时存在于”两个世界（？）有时候会彻底睡死（跟真死了一样）但有时候很正常",
                extra: "喜欢在草原散步，独自穿越密林，最喜欢在下雨天睡觉（（（",
                images: [
                    { url: "images/文件已有标识码2.jpg", caption: "双视图" }
                ]
            },
            //{
              //  id: 2,
              // name: "角色B",
               // title: "第二个角色",
              //  avatar: "https://via.placeholder.com/100?text=OC-B",
              //  basicInfo: {
               //     "年龄": "??",
               //     "性别": "??",
               //     "职业": "待定"
              //  },
               // personality: "角色的性格描述待补充...",
               // background: "背景故事待补充...",
               // extra: "",
               // images: []
           // }
        ];

        // 全局状态变量
        let currentOCId = null;           // 当前选中的角色ID
        let currentImageIndex = 0;        // 当前查看的图片索引（用于Lightbox）
        let currentImagesList = [];       // 当前角色的图片列表（用于Lightbox导航）

        // 获取DOM元素引用
        const ocListContainer = document.getElementById('oc-list-container');
        const ocDetailContainer = document.getElementById('oc-detail');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        // ============================================================
        // 工具函数
        // ============================================================

        /**
         * HTML转义函数 - 防止XSS攻击
         * 将特殊字符转换为HTML实体
         * @param {string} str - 需要转义的字符串
         * @returns {string} 转义后的安全字符串
         */
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, function(m) {
                const map = {
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    '"': '&quot;',
                    "'": '&#039;'
                };
                return map[m];
            });
        }

        /**
         * 判断字符串是否为有效的图片路径
         * 支持：网络URL(http/https)、绝对路径(/)、相对路径(含图片扩展名或路径分隔符)
         * @param {string} str - 待检测的字符串
         * @returns {boolean} 是否为有效图片路径
         */
        function isImagePath(str) {
            if (!str || typeof str !== 'string') return false;
            // 检测网络URL
            if (str.startsWith('http://') || str.startsWith('https://')) return true;
            // 检测绝对路径
            if (str.startsWith('/')) return true;
            // 检测相对路径：包含常见图片扩展名
            if (/\.(jpg|jpeg|png|gif|webp|svg|bmp|ico)$/i.test(str)) return true;
            // 检测包含路径分隔符的相对路径（如 folder/name.png）
            if (str.includes('/')) return true;
            return false;
        }

        /**
         * 生成头像HTML
         * 统一处理头像显示逻辑：
         * - 如果是图片路径，使用img标签显示，并设置错误处理
         * - 如果是emoji或文字，直接显示
         * @param {string} avatarValue - 头像值（图片路径或emoji）
         * @param {string} altName - 角色名称（用于alt属性）
         * @returns {string} 头像的HTML字符串
         */
        function getAvatarHtml(avatarValue, altName) {
            if (isImagePath(avatarValue)) {
                // 图片路径：使用img标签，onerror处理加载失败情况
                // 【修复】改进错误处理，使用更可靠的方式替换失败图片
                return `<img src="${escapeHtml(avatarValue)}" alt="${escapeHtml(altName)}" 
                         onerror="this.onerror=null; this.parentElement.innerHTML='<span class=\\'avatar-placeholder\\'>🧑</span>';">`;
            } else {
                // 纯文本或emoji：直接显示
                return `<span class="avatar-placeholder">${avatarValue || '🧑'}</span>`;
            }
        }

        /**
         * 生成详情页大头像HTML
         * 与getAvatarHtml类似，但尺寸更大
         * @param {string} avatarValue - 头像值
         * @param {string} altName - 角色名称
         * @returns {string} 大头像的HTML字符串
         */
        function getDetailAvatarHtml(avatarValue, altName) {
            if (isImagePath(avatarValue)) {
                return `<img src="${escapeHtml(avatarValue)}" alt="${escapeHtml(altName)}" 
                         onerror="this.onerror=null; this.parentElement.innerHTML='<span style=\\'font-size:3rem\\'>🧑</span>';">`;
            } else {
                return `<span style="font-size:3rem">${avatarValue || '🧑'}</span>`;
            }
        }

        // ============================================================
        // 渲染函数
        // ============================================================

        /**
         * 渲染左侧角色列表（侧边栏）
         * 根据ocData数组生成角色卡片列表
         */
        function renderSidebar() {
            // 如果没有角色数据，显示空状态
            if (!ocData.length) {
                ocListContainer.innerHTML = '<div class="empty-placeholder" style="padding:20px">暂无角色，请在 ocData 中添加数据</div>';
                return;
            }
            
            let html = '';
            // 遍历所有角色生成卡片
            ocData.forEach(oc => {
                // 判断是否为当前选中角色，添加active类
                const activeClass = (currentOCId === oc.id) ? 'active' : '';
                // 生成头像HTML
                const avatarHtml = getAvatarHtml(oc.avatar, oc.name);
                
                html += `
                    <div class="oc-card-item ${activeClass}" data-id="${oc.id}" role="button" tabindex="0">
                        <div class="oc-card-avatar">${avatarHtml}</div>
                        <div class="oc-card-name">${escapeHtml(oc.name)}</div>
                    </div>
                `;
            });
            
            ocListContainer.innerHTML = html;
            
            // 绑定点击事件：点击卡片切换角色
            document.querySelectorAll('.oc-card-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = parseInt(item.getAttribute('data-id'));
                    if (!isNaN(id)) selectOCById(id);
                });
                
                // 支持键盘导航（回车键选择）
                item.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const id = parseInt(item.getAttribute('data-id'));
                        if (!isNaN(id)) selectOCById(id);
                    }
                });
            });
        }

        /**
         * 渲染设定图区域
         * 生成图片网格，并支持点击放大查看
         * @param {Array} images - 图片数组，元素可以是字符串URL或对象{url, caption}
         * @returns {string} 图片区域的HTML字符串
         */
        function renderImagesSection(images) {
            // 如果没有图片，显示空状态
            if (!images || images.length === 0) {
                return `<div class="info-content">暂无设定图</div>`;
            }
            
            let imagesHtml = '<div class="images-grid">';
            
            // 遍历图片数组
            images.forEach((img, index) => {
                let url = '';
                let caption = '';
                
                // 支持两种格式：字符串URL或对象
                if (typeof img === 'string') {
                    url = img;
                    caption = '';
                } else {
                    url = img.url || '';
                    caption = img.caption ? escapeHtml(img.caption) : '';
                }
                
                if (!url) return; // 跳过空URL
                
                // 生成图片卡片，点击打开Lightbox查看器
                // 【修复】使用onclick调用openLightbox函数，传递图片索引
                imagesHtml += `
                    <div class="image-card" onclick="openLightbox(${index})" title="点击查看大图">
                        <img src="${escapeHtml(url)}" alt="${caption || '设定图'}" loading="lazy" 
                             onerror="this.src='https://via.placeholder.com/300?text=图片加载失败'">
                        ${caption ? `<div class="image-caption">${caption}</div>` : ''}
                    </div>
                `;
            });
            
            imagesHtml += '</div>';
            return imagesHtml;
        }

        /**
         * 渲染右侧角色详情面板
         * @param {Object} oc - 角色数据对象
         */
        function renderDetail(oc) {
            // 如果没有选中角色，显示空状态
            if (!oc) {
                ocDetailContainer.innerHTML = '<div class="empty-placeholder">✨ 请从左侧选择一个角色 ✨</div>';
                return;
            }
            
            // 生成大头像HTML
            const avatarHtml = getDetailAvatarHtml(oc.avatar, oc.name);

            // 生成基本信息网格
            let basicInfoHtml = '';
            if (oc.basicInfo && Object.keys(oc.basicInfo).length > 0) {
                basicInfoHtml = '<div class="info-grid">';
                for (const [key, value] of Object.entries(oc.basicInfo)) {
                    basicInfoHtml += `
                        <div class="info-item">
                            <span class="info-label">${escapeHtml(key)}：</span>
                            <span class="info-value">${escapeHtml(value)}</span>
                        </div>
                    `;
                }
                basicInfoHtml += '</div>';
            } else {
                basicInfoHtml = '<div class="info-content">暂无基本信息</div>';
            }

            // 生成各区块内容（带默认值）
            const personalityHtml = oc.personality 
                ? `<div class="info-content">${escapeHtml(oc.personality)}</div>` 
                : '<div class="info-content">未填写</div>';
                
            const backgroundHtml = oc.background 
                ? `<div class="info-content">${escapeHtml(oc.background)}</div>` 
                : '<div class="info-content">未填写</div>';
                
            const extraHtml = oc.extra 
                ? `<div class="info-content">${escapeHtml(oc.extra)}</div>` 
                : '';
                
            const imagesHtml = renderImagesSection(oc.images);

            // 组合详情HTML
            const detailHtml = `
                <div class="detail-header">
                    <div class="detail-avatar">${avatarHtml}</div>
                    <div class="detail-name">
                        <h2>${escapeHtml(oc.name)}</h2>
                        ${oc.title ? `<div class="detail-title">${escapeHtml(oc.title)}</div>` : ''}
                    </div>
                </div>
                
                <div class="info-section">
                    <h3>📋 基本资料</h3>
                    ${basicInfoHtml}
                </div>
                
                <div class="info-section">
                    <h3>💭 性格</h3>
                    ${personalityHtml}
                </div>
                
                <div class="info-section">
                    <h3>📖 背景故事</h3>
                    ${backgroundHtml}
                </div>
                
                ${extraHtml ? `<div class="info-section"><h3>✨ 其他</h3>${extraHtml}</div>` : ''}
                
                <div class="info-section">
                    <h3>🎨 设定图</h3>
                    ${imagesHtml}
                </div>
            `;
            
            ocDetailContainer.innerHTML = detailHtml;
            
            // 更新当前图片列表（用于Lightbox导航）
            currentImagesList = oc.images || [];
        }

        // ============================================================
        // 交互功能函数
        // ============================================================

        /**
         * 根据ID选择角色
         * 更新当前选中状态并重新渲染侧边栏和详情
         * @param {number} id - 角色ID
         */
        function selectOCById(id) {
            const selected = ocData.find(oc => oc.id === id);
            if (selected) {
                currentOCId = id;
                renderSidebar();  // 重新渲染侧边栏以更新高亮状态
                renderDetail(selected);
            }
        }

        /**
         * 打开图片查看器（Lightbox）
         * @param {number} index - 图片索引
         */
        function openLightbox(index) {
            if (!currentImagesList || currentImagesList.length === 0) return;
            
            currentImageIndex = index;
            updateLightboxContent();
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // 禁止背景滚动
        }

        /**
         * 关闭图片查看器
         * @param {Event} event - 点击事件
         */
        function closeLightbox(event) {
            // 只有点击背景或关闭按钮时才关闭（防止点击图片时关闭）
            if (event.target === lightbox || event.target.classList.contains('lightbox-close')) {
                lightbox.classList.remove('active');
                document.body.style.overflow = ''; // 恢复背景滚动
            }
        }

        /**
         * 切换图片（上一张/下一张）
         * @param {number} direction - 切换方向（-1为上一张，1为下一张）
         * @param {Event} event - 点击事件
         */
        function changeImage(direction, event) {
            event.stopPropagation(); // 阻止事件冒泡
            
            if (!currentImagesList || currentImagesList.length === 0) return;
            
            // 计算新索引（循环播放）
            currentImageIndex += direction;
            if (currentImageIndex < 0) {
                currentImageIndex = currentImagesList.length - 1;
            } else if (currentImageIndex >= currentImagesList.length) {
                currentImageIndex = 0;
            }
            
            updateLightboxContent();
        }

        /**
         * 更新Lightbox显示内容
         */
        function updateLightboxContent() {
            const img = currentImagesList[currentImageIndex];
            let url = '';
            let caption = '';
            
            if (typeof img === 'string') {
                url = img;
                caption = `${currentImageIndex + 1} / ${currentImagesList.length}`;
            } else {
                url = img.url || '';
                caption = img.caption 
                    ? `${img.caption} (${currentImageIndex + 1} / ${currentImagesList.length})`
                    : `${currentImageIndex + 1} / ${currentImagesList.length}`;
            }
            
            lightboxImg.src = url;
            lightboxCaption.textContent = caption;
        }

        /**
         * 键盘事件监听（Lightbox导航支持）
         */
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') {
                // ESC键关闭Lightbox
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            } else if (e.key === 'ArrowLeft') {
                // 左箭头上一张
                changeImage(-1, { stopPropagation: () => {} });
            } else if (e.key === 'ArrowRight') {
                // 右箭头下一张
                changeImage(1, { stopPropagation: () => {} });
            }
        });

        // ============================================================
        // 主题切换功能
        // ============================================================

        /**
         * 获取当前主题（从localStorage读取）
         * @returns {string} 主题名称 'light' 或 'dark'
         */
        function getCurrentTheme() { 
            return localStorage.getItem('theme') || 'light'; 
        }

        /**
         * 设置主题
         * @param {string} theme - 主题名称 'light' 或 'dark'
         */
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        /**
         * 切换主题（亮色/暗色）
         */
        function toggleTheme() {
            const current = getCurrentTheme();
            setTheme(current === 'light' ? 'dark' : 'light');
        }

        // ============================================================
        // 初始化函数
        // ============================================================

        /**
         * 页面初始化
         * 加载主题、渲染初始角色列表
         */
        function init() {
            // 如果有角色数据，默认选中第一个
            if (ocData.length > 0) {
                currentOCId = ocData[0].id;
                renderSidebar();
                renderDetail(ocData[0]);
            } else {
                // 无数据时显示空状态
                renderSidebar();
                ocDetailContainer.innerHTML = '<div class="empty-placeholder">📭 暂无角色数据，请在 ocData 中添加内容</div>';
            }
        }

        // DOM加载完成后执行初始化
        document.addEventListener('DOMContentLoaded', () => {
            setTheme(getCurrentTheme());
            init();
        });
    </script>
</body>
</html>
