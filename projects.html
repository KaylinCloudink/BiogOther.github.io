<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>项目进程图 · 开发路线</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <style>
        /* ==================== 变量定义（与博客主站一致） ==================== */
        :root {
            --bg-color: #f5f5f5;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --link-color: #0066cc;
            --link-hover: #0052a3;
            --shadow: rgba(0, 0, 0, 0.1);
            --accent-bg: #f0f7ff;
            --progress-bg: #e0e0e0;
            --progress-fill: linear-gradient(90deg, #0066cc, #3b82f6);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
            --text-secondary: #b0b0b0;
            --border-color: #404040;
            --link-color: #66b3ff;
            --link-hover: #99ccff;
            --shadow: rgba(0, 0, 0, 0.3);
            --accent-bg: #1e2a3a;
            --progress-bg: #404040;
            --progress-fill: linear-gradient(90deg, #66b3ff, #60a5fa);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            width: 100%;
        }

        /* 导航栏 */
        nav {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 4px var(--shadow);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--link-color);
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-color);
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        /* 页面头部 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(120deg, var(--link-color), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .page-header p {
            color: var(--text-secondary);
        }

        /* 项目列表容器 */
        .projects-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 项目卡片 */
        .project-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .project-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px var(--shadow);
            border-color: var(--link-color);
        }

        /* 项目头部：名称 + 状态标签 */
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .project-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            background-color: var(--accent-bg);
            color: var(--link-color);
            border: 1px solid var(--border-color);
        }

        /* 状态颜色扩展（用户可根据需要添加更多样式） */
        .status-badge.completed {
            background-color: #10b981;
            color: white;
            border: none;
        }
        .status-badge.in-progress {
            background-color: var(--link-color);
            color: white;
            border: none;
        }
        .status-badge.planned {
            background-color: #f59e0b;
            color: white;
            border: none;
        }
        .status-badge.paused {
            background-color: #6b7280;
            color: white;
            border: none;
        }

        /* 项目描述 */
        .project-desc {
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 进度条区域 */
        .progress-section {
            margin-top: 16px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        .progress-bar-container {
            background-color: var(--progress-bg);
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: var(--progress-fill);
            border-radius: 20px;
            transition: width 0.5s ease;
        }

        /* 最后更新日期 */
        .project-footer {
            margin-top: 16px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-align: right;
            border-top: 1px dashed var(--border-color);
            padding-top: 12px;
        }

        /* 空状态 */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-color);
        }

        footer {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            padding: 30px 20px;
            text-align: center;
        }

        footer p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .project-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .project-name {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">OC设定集</a>
            <div class="nav-links">
                <a href="https://kaylincloudink.github.io/BiogOther.github.io/index.html">返回上一页</a>
                <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                    <span id="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>
    
    <main>
        <div class="page-header">
            <h1>📊 项目进程图</h1>
            <p>追踪当前进行中的各项任务与开发进度</p>
        </div>

        <div id="projects-container" class="projects-container">
            <!-- 项目卡片将动态渲染到这里 -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Kaylin Cloudink. 保留所有权利. 项目进程图 | 持续更新中</p>
    </footer>

    <script>
        // ============================================================
        // 项目数据配置区域 ———— 请在此处修改/添加您的项目信息
        // 每个项目对象包含以下字段：
        //   id: 唯一标识（数字或字符串，可选）
        //   name: 项目名称
        //   description: 项目简要描述
        //   status: 状态 (可选值: 'planned', 'in-progress', 'completed', 'paused' 或自定义文本)
        //   progress: 进度百分比 (0-100)
        //   lastUpdate: 最后更新日期（字符串，可选）
        // ============================================================
        const projectsData = [
            {
                id: 1,
                name: "Blog完善计划",
                description: "正在进行中......完善博客的功能和内容，增加更多文章和工具。",
                status: "in-progress",
                progress: 55,
                lastUpdate: "2026-04-19"
            },
            {
                id: 2,
                name: "OC设定集页面",
                description: "设定展示页面，支持多角色切换。",
                status: "in-progress",
                progress: 15,
                lastUpdate: "2026-04-19"
            },
            {
                id: 3,
                name: "117报时台工具",
                description: "基于国家授时中心NTP的精准报时页面，每10秒预报未来时刻。",
                status: "in-progress",
                progress: 10,
                lastUpdate: "2026-04-16"
            },
            // 添加更多项目：复制上方对象，以逗号分隔，修改相应字段即可
        ];

        // 获取容器元素
        const container = document.getElementById('projects-container');

        // 辅助：转义HTML防止XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 根据状态文本返回对应的CSS类（用于不同颜色）
        function getStatusClass(status) {
            const statusMap = {
                'planned': 'planned',
                'in-progress': 'in-progress',
                'completed': 'completed',
                'paused': 'paused'
            };
            return statusMap[status] || '';
        }

        // 状态文本中文化
        function getStatusText(status) {
            const statusTextMap = {
                'planned': '📋 计划中',
                'in-progress': '⚙️ 进行中',
                'completed': '✅ 已完成',
                'paused': '⏸️ 暂停'
            };
            return statusTextMap[status] || status;
        }

        // 渲染项目列表
        function renderProjects() {
            if (!projectsData.length) {
                container.innerHTML = '<div class="empty-message">📭 暂无项目数据，请在 projectsData 中添加内容</div>';
                return;
            }

            let html = '';
            projectsData.forEach(proj => {
                const safeName = escapeHtml(proj.name);
                const safeDesc = escapeHtml(proj.description);
                const statusClass = getStatusClass(proj.status);
                const statusText = getStatusText(proj.status);
                const progress = Math.min(100, Math.max(0, proj.progress));
                const lastUpdate = proj.lastUpdate ? escapeHtml(proj.lastUpdate) : '未知';

                html += `
                    <div class="project-card" data-id="${proj.id}">
                        <div class="project-header">
                            <div class="project-name">${safeName}</div>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div class="project-desc">${safeDesc}</div>
                        <div class="progress-section">
                            <div class="progress-info">
                                <span>📈 完成进度</span>
                                <span>${progress}%</span>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-fill" style="width: ${progress}%;"></div>
                            </div>
                        </div>
                        <div class="project-footer">
                            🕒 最后更新：${lastUpdate}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 主题切换（与博客主站一致）
        function getCurrentTheme() { return localStorage.getItem('theme') || 'light'; }
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            const current = getCurrentTheme();
            setTheme(current === 'light' ? 'dark' : 'light');
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            setTheme(getCurrentTheme());
            renderProjects();
        });
    </script>
</body>
</html>
